name: DevSecOps Simple para Flutter
on: 
  push: 
    branches: [main]
  pull_request: 
    branches: [main]

jobs:
  # 1. Análisis de secretos
  secret_scan:
    name: Seguridad con Gitleaks
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout del código
        uses: actions/checkout@v4
      - name: Instalar Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64 -o gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Ejecutar Gitleaks para detectar credenciales

  # 2. Análisis de código
  code_analysis:
    name: 🔍 Análisis de Código
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"

  # 3. Análisis de seguridad del APK (DAST simplificado)
  mobile_security:
    name: 📱 Análisis de Seguridad Móvil
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.3'
          channel: 'stable'
          
      - name: Instalar herramientas de análisis
        run: |
          sudo apt-get update
          sudo apt-get install -y aapt apktool xmlstarlet jq
          
      - name: Build APK
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos
          flutter build apk --release
          
      - name: Análisis de seguridad del APK
        id: security_check
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          REPORT_FILE="security-analysis.md"
          
          echo "# 📱 Reporte de Seguridad - Flutter APK" > $REPORT_FILE
          echo "**Fecha:** $(date)" >> $REPORT_FILE
          echo "**APK:** app-release.apk" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          
          # 1. Información básica del APK
          echo "## 📋 Información del APK" >> $REPORT_FILE
          aapt dump badging "$APK_PATH" | grep -E "package:|versionName|targetSdkVersion" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          
          # 2. Análisis de permisos
          echo "## 🔐 Análisis de Permisos" >> $REPORT_FILE
          echo "### Permisos solicitados:" >> $REPORT_FILE
          aapt dump permissions "$APK_PATH" | grep "uses-permission:" | sort | uniq >> $REPORT_FILE
          
          # Contar permisos peligrosos
          DANGEROUS_PERMS=$(aapt dump permissions "$APK_PATH" | grep -E "CAMERA|LOCATION|MICROPHONE|CONTACTS|STORAGE|SMS|PHONE" | wc -l)
          echo "" >> $REPORT_FILE
          echo "**Permisos peligrosos encontrados:** $DANGEROUS_PERMS" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          
          # 3. Verificar modo debug
          echo "## 🐛 Verificación de Modo Debug" >> $REPORT_FILE
          if aapt dump badging "$APK_PATH" | grep -q "application-debuggable"; then
            echo "❌ **ALERTA: APK está en modo DEBUG**" >> $REPORT_FILE
            echo "debug_mode=true" >> $GITHUB_OUTPUT
          else
            echo "✅ APK está en modo Release" >> $REPORT_FILE
            echo "debug_mode=false" >> $GITHUB_OUTPUT
          fi
          echo "" >> $REPORT_FILE
          
          # 4. Análisis del certificado
          echo "## 🔏 Información del Certificado" >> $REPORT_FILE
          echo '```' >> $REPORT_FILE
          keytool -printcert -jarfile "$APK_PATH" 2>/dev/null | grep -E "Owner:|Valid|SHA256:" >> $REPORT_FILE
          echo '```' >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          
          # 5. Componentes exportados
          echo "## 🌐 Componentes Exportados" >> $REPORT_FILE
          
          # Descompilar AndroidManifest
          apktool d -s -f "$APK_PATH" -o apk_decoded >/dev/null 2>&1
          
          if [ -f "apk_decoded/AndroidManifest.xml" ]; then
            EXPORTED=$(xmlstarlet sel -t -m "//*[@android:exported='true']" -v "name()" -n apk_decoded/AndroidManifest.xml 2>/dev/null | wc -l)
            echo "Componentes exportados encontrados: $EXPORTED" >> $REPORT_FILE
          fi
          echo "" >> $REPORT_FILE
          
          # 6. Análisis de librerías nativas
          echo "## 📚 Librerías Nativas" >> $REPORT_FILE
          unzip -l "$APK_PATH" | grep "\.so$" | awk '{print $4}' | sort | uniq >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          
          # 7. Resumen de seguridad
          echo "## 📊 Resumen de Seguridad" >> $REPORT_FILE
          
          ISSUES=0
          
          if [ "$DANGEROUS_PERMS" -gt 5 ]; then
            echo "- ⚠️ Muchos permisos peligrosos ($DANGEROUS_PERMS)" >> $REPORT_FILE
            ISSUES=$((ISSUES + 1))
          fi
          
          if [ "${{ steps.security_check.outputs.debug_mode }}" = "true" ]; then
            echo "- ❌ APK en modo debug" >> $REPORT_FILE
            ISSUES=$((ISSUES + 2))
          fi
          
          if [ "$EXPORTED" -gt 0 ]; then
            echo "- ⚠️ Componentes exportados detectados" >> $REPORT_FILE
            ISSUES=$((ISSUES + 1))
          fi
          
          echo "" >> $REPORT_FILE
          echo "**Total de problemas encontrados:** $ISSUES" >> $REPORT_FILE
          
          echo "issues_count=$ISSUES" >> $GITHUB_OUTPUT
          
          # Mostrar resumen en consola
          echo "════════════════════════════════════════"
          echo "📱 RESUMEN DE SEGURIDAD"
          echo "════════════════════════════════════════"
          echo "✅ Análisis completado"
          echo "📋 Permisos peligrosos: $DANGEROUS_PERMS"
          echo "🐛 Modo Debug: ${{ steps.security_check.outputs.debug_mode }}"
          echo "🌐 Componentes exportados: $EXPORTED"
          echo "⚠️  Problemas totales: $ISSUES"
          echo "════════════════════════════════════════"
          
          # Limpiar
          rm -rf apk_decoded
          
      - name: Subir reporte
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-analysis.md
          
      - name: Comentar en PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-analysis.md', 'utf8');
            
            // Extraer solo el resumen para el comentario
            const summaryStart = report.indexOf('## 📊 Resumen de Seguridad');
            const summary = report.substring(summaryStart);
            
            const comment = `## 🛡️ Análisis de Seguridad Móvil\n\n${summary}\n\n📄 [Ver reporte completo en los artifacts]`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })
            
      - name: Verificar umbral de seguridad
        run: |
          ISSUES=${{ steps.security_check.outputs.issues_count }}
          
          if [ "$ISSUES" -gt 2 ]; then
            echo "❌ Se encontraron $ISSUES problemas de seguridad"
            echo "Por favor revisa el reporte antes de continuar"
            exit 1
          else
            echo "✅ Análisis de seguridad pasado"
          fi

  # 4. Publicar APK
  publish:
    name: 🚀 Publicar APK
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [secret_scan, code_analysis, mobile_security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.3'
      - run: |
          flutter pub get
          flutter build apk --release
          
      - name: Commit APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          cp build/app/outputs/flutter-apk/app-release.apk .
          git add app-release.apk
          git commit -m "✅ APK verificado y seguro [skip ci]"
          git push
