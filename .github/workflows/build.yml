name: DevSecOps para Frontend Móvil Optimizado

on: 
  push: 
    branches: 
      - main  # Cambiado a main
      - develop
  pull_request: 
    branches: 
      - main  # Cambiado a main

# Variables de entorno globales
env:
  FLUTTER_VERSION: '3.27.3'
  JAVA_VERSION: '17'

jobs: 
  # Job paralelo para análisis de seguridad
  seguridad_gitleaks: 
    name: Seguridad con Gitleaks
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Cache de Gitleaks
        uses: actions/cache@v3
        with:
          path: /usr/local/bin/gitleaks
          key: gitleaks-${{ runner.os }}-latest
          restore-keys: |
            gitleaks-${{ runner.os }}-
      
      - name: Instalar Gitleaks
        run: |
          if [ ! -f /usr/local/bin/gitleaks ]; then
            curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64 -o gitleaks
            chmod +x gitleaks
            sudo mv gitleaks /usr/local/bin/
          fi
      
      - name: Ejecutar Gitleaks para detectar credenciales
        run: gitleaks detect --verbose --redact --source . --exit-code 1

  # Job paralelo para análisis de código
  analisis_codigo_sonarqube: 
    name: Análisis de Código con SonarCloud
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout del código
        uses: actions/checkout@v4
        with: 
          fetch-depth: 0
      
      - name: Cache de dependencias Java
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with: 
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env: 
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"

  # Job para setup de Flutter (reutilizable)
  setup_flutter:
    name: Setup Flutter
    runs-on: ubuntu-latest
    outputs:
      flutter-path: ${{ steps.flutter-action.outputs.FLUTTER_ROOT }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      
      - name: Cache de Flutter
        uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
            /opt/hostedtoolcache/flutter
          key: ${{ runner.os }}-flutter-${{ env.FLUTTER_VERSION }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Setup Flutter
        id: flutter-action
        uses: subosito/flutter-action@v2
        with: 
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      
      - name: Cache de dependencias Flutter
        uses: actions/cache@v3
        with:
          path: |
            .dart_tool
            build
          key: ${{ runner.os }}-flutter-deps-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-deps-
      
      - name: Instalar dependencias
        run: flutter pub get

  # Job de análisis dinámico optimizado
  analisis_mobsf: 
    name: Análisis Dinámico con MobSF
    runs-on: ubuntu-latest
    needs: [seguridad_gitleaks, analisis_codigo_sonarqube, setup_flutter]
    steps: 
      - name: Checkout del código
        uses: actions/checkout@v4
      
      - name: Restaurar cache de Flutter
        uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
            /opt/hostedtoolcache/flutter
            .dart_tool
            build
          key: ${{ runner.os }}-flutter-${{ env.FLUTTER_VERSION }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with: 
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      
      - name: Instalar dependencias
        run: flutter pub get
      
      - name: Generar APK debug para análisis
        run: flutter build apk --debug --target-platform android-arm64
      
      - name: Subir APK para análisis
        uses: actions/upload-artifact@v4
        with: 
          name: apk-debug-analysis
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 1

  # Job de build de APK
  build_apk: 
    name: Generar APK
    runs-on: ubuntu-latest
    needs: [analisis_mobsf]
    steps: 
      - name: Checkout del código
        uses: actions/checkout@v4
      
      - name: Restaurar cache de Flutter
        uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
            /opt/hostedtoolcache/flutter
            .dart_tool
            build
          key: ${{ runner.os }}-flutter-${{ env.FLUTTER_VERSION }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with: 
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      
      - name: Instalar dependencias
        run: flutter pub get
      
      - name: Generar APK de producción
        run: flutter build apk --release --target-platform android-arm64
      
      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with: 
          name: apk-produccion-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # Job para notificaciones
  notificaciones:
    name: Notificaciones
    runs-on: ubuntu-latest
    needs: [build_apk]
    if: always()
    steps:
      - name: Notificar resultado
        run: |
          if [ "${{ needs.build_apk.result }}" == "success" ]; then
            echo "✅ Pipeline completado exitosamente - APK generado"
          else
            echo "❌ Pipeline falló"
            exit 1
          
